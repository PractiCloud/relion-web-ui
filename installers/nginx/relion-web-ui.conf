# RELION Web UI 5 (headless install)
# Basic-auth via /etc/relion-web-ui.htpasswd. No TLS - front with your own proxy if you need it.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 500M;
    client_body_timeout 600s;

    auth_basic "RELION Web UI 5";
    auth_basic_user_file /etc/relion-web-ui.htpasswd;

    # Frontend (React build)
    root /var/www/relion-web-ui;

    # SPA fallback for HashRouter
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed assets, safe to cache
    location /static/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Particle picker (separate React app)
    location /particle-picker/ {
        alias /var/www/relion-web-ui/particle-picker/;
        try_files $uri $uri/ /particle-picker/index.html;
    }

    # Backend
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-User  $remote_user;
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        proxy_buffering       off;
    }

    location /pp-api/ {
        proxy_pass         http://127.0.0.1:5000/pp-api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }

    # No-auth health for external monitors
    location = /healthz {
        auth_basic          off;
        access_log          off;
        proxy_pass          http://127.0.0.1:5000/api/health;
        proxy_read_timeout  5s;
    }
}
